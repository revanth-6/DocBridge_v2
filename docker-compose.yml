
services:
  postgres:
    image: postgres:15-alpine
    container_name: docbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: docbridge_db
      POSTGRES_USER: docbridge_user
      POSTGRES_PASSWORD: DocBridge@2024Secure
    ports:
      - '5433:5432'
    volumes:
      - docbridge_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docbridge_user -d docbridge_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    build: ./gateway
    container_name: docbridge-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: ./gateway/.env
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  auth-service:
    build: ./services/auth-service
    container_name: docbridge-auth
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file: ./services/auth-service/.env
