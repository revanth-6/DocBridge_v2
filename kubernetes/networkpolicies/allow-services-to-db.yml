apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-db
  namespace: docbridge
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: Exists
  policyTypes:
    - Egress
  egress:
    # Allow egress to the PostgreSQL flexible server in the database subnet (10.0.3.0/24)
    - to:
        - ipBlock:
            cidr: 10.0.3.0/24
      ports:
        - protocol: TCP
          port: 5432
