apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: docbridge
  labels:
    app: db-migration
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: db-migration
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: docbridge-workload-sa
      nodeSelector:
        nodepool-type: application
      restartPolicy: Never
      containers:
        - name: db-migration
          image: docbridgedevacr.azurecr.io/db-migrations:latest
          command: ["npm", "run", "migrate"]
          envFrom:
            - configMapRef:
                name: docbridge-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docbridge-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: docbridge-secret-provider
