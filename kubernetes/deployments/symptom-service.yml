apiVersion: apps/v1
kind: Deployment
metadata:
  name: symptom-service
  namespace: docbridge
  labels:
    app: symptom-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: symptom-service
  template:
    metadata:
      labels:
        app: symptom-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: docbridge-workload-sa
      nodeSelector:
        nodepool-type: application
      containers:
        - name: symptom-service
          image: docbridgedevacr.azurecr.io/symptom-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3006
          envFrom:
            - configMapRef:
                name: docbridge-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docbridge-secrets
                  key: DB_PASSWORD
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: docbridge-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: docbridge-secrets
                  key: JWT_REFRESH_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: docbridge-secret-provider
