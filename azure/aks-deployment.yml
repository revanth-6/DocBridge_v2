# --- GATEWAY SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  labels:
    app: docbridge-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docbridge-gateway
  template:
    metadata:
      labels:
        app: docbridge-gateway
    spec:
      containers:
      - name: gateway
        image: docbridge.azurecr.io/gateway:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: docbridge-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: LoadBalancer
  selector:
    app: docbridge-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

