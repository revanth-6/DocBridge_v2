apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: docbridge-secret-provider
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.azure.workloadIdentityClientId | quote }}
    keyvaultName: {{ .Values.azure.keyVaultName | quote }}
    tenantId: {{ .Values.azure.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: db-password
          objectType: secret
        - |
          objectName: jwt-access-secret
          objectType: secret
        - |
          objectName: jwt-refresh-secret
          objectType: secret
        - |
          objectName: azure-openai-key
          objectType: secret
        - |
          objectName: redis-connection-string
          objectType: secret
  secretObjects:
    - secretName: docbridge-secrets
      type: Opaque
      data:
        - objectName: db-password
          key: DB_PASSWORD
        - objectName: jwt-access-secret
          key: JWT_ACCESS_SECRET
        - objectName: jwt-refresh-secret
          key: JWT_REFRESH_SECRET
        - objectName: azure-openai-key
          key: AZURE_OPENAI_KEY
        - objectName: redis-connection-string
          key: REDIS_CONNECTION_STRING
