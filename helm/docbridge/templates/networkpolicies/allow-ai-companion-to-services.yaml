apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-companion-to-services
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: ai-companion-service
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: consultation-service
      ports:
        - protocol: TCP
          port: 3002
    - to:
        - podSelector:
            matchLabels:
              app: prescription-service
      ports:
        - protocol: TCP
          port: 3003
    - to:
        - podSelector:
            matchLabels:
              app: labreport-service
      ports:
        - protocol: TCP
          port: 3005
    - to:
        - podSelector:
            matchLabels:
              app: symptom-service
      ports:
        - protocol: TCP
          port: 3006
    - to:
        - podSelector:
            matchLabels:
              app: family-service
      ports:
        - protocol: TCP
          port: 3009
