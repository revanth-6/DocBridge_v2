apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        - ipBlock:
            cidr: 10.0.2.0/24
        - ipBlock:
            cidr: 10.0.1.0/24
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - protocol: TCP
          port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: consultation-service
      ports:
        - protocol: TCP
          port: 3002
    - to:
        - podSelector:
            matchLabels:
              app: prescription-service
      ports:
        - protocol: TCP
          port: 3003
    - to:
        - podSelector:
            matchLabels:
              app: reminder-service
      ports:
        - protocol: TCP
          port: 3004
    - to:
        - podSelector:
            matchLabels:
              app: labreport-service
      ports:
        - protocol: TCP
          port: 3005
    - to:
        - podSelector:
            matchLabels:
              app: symptom-service
      ports:
        - protocol: TCP
          port: 3006
    - to:
        - podSelector:
            matchLabels:
              app: ai-companion-service
      ports:
        - protocol: TCP
          port: 3007
    - to:
        - podSelector:
            matchLabels:
              app: health-summary-service
      ports:
        - protocol: TCP
          port: 3008
    - to:
        - podSelector:
            matchLabels:
              app: family-service
      ports:
        - protocol: TCP
          port: 3009
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
