# Default values for DocBridge Helm Chart.
# This is a YAML-formatted file.

environment: "dev"

# Global settings
global:
  imageRegistry: docbridgedevacr.azurecr.io
  imageTag: latest
  imagePullPolicy: Always
  nodeSelector:
    nodepool-type: application

namespace:
  create: false
  name: docbridge
  managedBy: gitops

azure:
  tenantId: ""
  workloadIdentityClientId: ""
  keyVaultName: ""

database:
  host: ""
  port: "5432"
  name: "docbridge_db"
  user: "docbridge_user"
  ssl: "true"

gateway:
  corsOrigin: ""
  azureOpenaiEndpoint: "https://docbridge-project1-resource.cognitiveservices.azure.com/"
  azureOpenaiDeploymentName: "gpt-4.1"
  azureOpenaiApiVersion: "2024-02-15-preview"

# HPAs are disabled by default
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Microservices configuration
services:
  ai-companion-service:
    port: 3007
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  api-gateway:
    port: 3000
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  auth-service:
    port: 3001
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  consultation-service:
    port: 3002
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  family-service:
    port: 3009
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  frontend:
    port: 80
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  health-summary-service:
    port: 3008
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  labreport-service:
    port: 3005
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  prescription-service:
    port: 3003
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  reminder-service:
    port: 3004
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  symptom-service:
    port: 3006
    replicas: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"

redis:
  replicas: 1
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
