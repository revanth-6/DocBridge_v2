name: Template Approval Gate

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
      ALERT_EMAIL:
        required: false
    outputs:
      approved:
        value: ${{ jobs.approval.outputs.approved }}

jobs:
  approval:
    name: Approval Gate - ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      approved: ${{ steps.set-approved.outputs.approved }}
    steps:
      - name: Send Approval Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: DocBridge DevOps <${{ secrets.SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_EMAIL }}
          subject: APPROVAL REQUIRED - Deploy ${{ inputs.service_name }} to ${{ inputs.environment }} - DocBridge
          body: |
            Deployment Approval is requested for service: ${{ inputs.service_name }}

            Service: ${{ inputs.service_name }}
            Image Tag: ${{ inputs.image_tag }}
            Environment: ${{ inputs.environment }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Commit: ${{ github.sha }}
            
            Approve and Deploy Here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Instructions:
            1. Click the link above to view the workflow run.
            2. Review the pending deployment environment.
            3. Select the environment and click "Review deployments".
            4. Choose "Approve and deploy" to proceed, or "Reject" to cancel the deployment.

      - name: Log Pending Review status
        run: |
          echo "Waiting for manual approval gate confirmation in GitHub UI..."
          echo "Please navigate to the Actions run page to approve the deployment."

      - name: Set Approved Output
        id: set-approved
        run: |
          echo "approved=true" >> $GITHUB_OUTPUT
