name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_VERSION: "1.5.7"

jobs:
  terraform-validate:
    name: "Terraform Validate and Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Azure Login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: "Terraform Init"
        run: |
          terraform init \
            -backend-config="resource_group_name=docbridge-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.TF_CONTAINER_NAME }}" \
            -backend-config="key=dev.terraform.tfstate"

      - name: "Terraform Format check"
        run: terraform fmt -check -recursive

      - name: "Terraform Validate"
        run: terraform validate

      - name: "Terraform Plan"
        id: plan
        run: |
          terraform plan -no-color -out=tfplan \
            -var="subscription_id=${{ env.ARM_SUBSCRIPTION_ID }}" \
            -var="owner=ArjunMehta" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="jwt_access_secret=${{ secrets.JWT_ACCESS_SECRET }}" \
            -var="jwt_refresh_secret=${{ secrets.JWT_REFRESH_SECRET }}" \
            -var="azure_openai_key=${{ secrets.AZURE_OPENAI_KEY }}"

      - name: "Upload Plan Artifact"
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: terraform/tfplan

      - name: "Publish Plan to PR"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            // If plan output is too long, we truncate or display summary
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Terraform Plan Succeeded ✅\nPlan binary uploaded as artifact. Merging this PR will execute apply on main.'
            })

  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Azure Login (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: "Terraform Init"
        run: |
          terraform init \
            -backend-config="resource_group_name=docbridge-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.TF_CONTAINER_NAME }}" \
            -backend-config="key=dev.terraform.tfstate"

      - name: "Download Plan Artifact"
        uses: actions/download-artifact@v3
        with:
          name: tfplan
          path: terraform

      - name: "Terraform Apply"
        run: terraform apply -auto-approve tfplan
