  # =========================================================================
  # 12. UNIFIED APPROVAL & HELM DEPLOY STAGES
  # =========================================================================
  cicd-approval:
    name: "DocBridge - Stage 4 - Approval Gate"
    needs:
      - detect-changes
      - cicd-db-migrations
      - cicd-frontend-docker
      - cicd-api-gateway-docker
      - cicd-auth-service-docker
      - cicd-consultation-docker
      - cicd-prescription-docker
      - cicd-reminder-docker
      - cicd-labreport-docker
      - cicd-symptom-docker
      - cicd-ai-companion-docker
      - cicd-health-summary-docker
      - cicd-family-docker
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.detect-changes.outputs.any_changed == 'true' &&
      (needs.cicd-db-migrations.result == 'success' || needs.cicd-db-migrations.result == 'skipped') &&
      (needs.cicd-frontend-docker.result == 'success' || needs.cicd-frontend-docker.result == 'skipped') &&
      (needs.cicd-api-gateway-docker.result == 'success' || needs.cicd-api-gateway-docker.result == 'skipped') &&
      (needs.cicd-auth-service-docker.result == 'success' || needs.cicd-auth-service-docker.result == 'skipped') &&
      (needs.cicd-consultation-docker.result == 'success' || needs.cicd-consultation-docker.result == 'skipped') &&
      (needs.cicd-prescription-docker.result == 'success' || needs.cicd-prescription-docker.result == 'skipped') &&
      (needs.cicd-reminder-docker.result == 'success' || needs.cicd-reminder-docker.result == 'skipped') &&
      (needs.cicd-labreport-docker.result == 'success' || needs.cicd-labreport-docker.result == 'skipped') &&
      (needs.cicd-symptom-docker.result == 'success' || needs.cicd-symptom-docker.result == 'skipped') &&
      (needs.cicd-ai-companion-docker.result == 'success' || needs.cicd-ai-companion-docker.result == 'skipped') &&
      (needs.cicd-health-summary-docker.result == 'success' || needs.cicd-health-summary-docker.result == 'skipped') &&
      (needs.cicd-family-docker.result == 'success' || needs.cicd-family-docker.result == 'skipped')
    uses: ./.github/workflows/template-approval-gate.yml
    with:
      service_name: DocBridge Application
      image_tag: ${{ github.sha }}
      environment: production
    secrets: inherit

  cicd-deploy:
    name: "DocBridge - Stage 5 - Helm Deploy"
    needs:
      - detect-changes
      - setup-infrastructure
      - cicd-approval
      - cicd-db-migrations
      - cicd-frontend-docker
      - cicd-api-gateway-docker
      - cicd-auth-service-docker
      - cicd-consultation-docker
      - cicd-prescription-docker
      - cicd-reminder-docker
      - cicd-labreport-docker
      - cicd-symptom-docker
      - cicd-ai-companion-docker
      - cicd-health-summary-docker
      - cicd-family-docker
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.cicd-approval.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group docbridge-rg \
            --name docbridge-dev-aks \
            --overwrite-existing

      - name: Run Helm Upgrade/Install
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10
          success=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES to run Helm upgrade..."
            if helm upgrade --install docbridge ./helm/docbridge \
              --namespace docbridge \
              --create-namespace \
              --values helm/docbridge/values.yaml \
              --values helm/docbridge/values.dev.yaml \
              --set azure.keyVaultName=${{ needs.setup-infrastructure.outputs.kv_name }} \
              --set azure.workloadIdentityClientId=${{ needs.setup-infrastructure.outputs.identity_id }} \
              --set azure.tenantId=${{ secrets.AZURE_TENANT_ID }} \
              --set database.host=${{ needs.setup-infrastructure.outputs.postgres_fqdn }} \
              --set gateway.corsOrigin=http://${{ needs.setup-infrastructure.outputs.agw_ip }} \
              --set services.db-migrations.image.tag=${{ needs.cicd-db-migrations.outputs.image_tag }} \
              --set services.frontend.image.tag=${{ needs.cicd-frontend-docker.outputs.image_tag }} \
              --set services.api-gateway.image.tag=${{ needs.cicd-api-gateway-docker.outputs.image_tag }} \
              --set services.auth-service.image.tag=${{ needs.cicd-auth-service-docker.outputs.image_tag }} \
              --set services.consultation-service.image.tag=${{ needs.cicd-consultation-docker.outputs.image_tag }} \
              --set services.prescription-service.image.tag=${{ needs.cicd-prescription-docker.outputs.image_tag }} \
              --set services.reminder-service.image.tag=${{ needs.cicd-reminder-docker.outputs.image_tag }} \
              --set services.labreport-service.image.tag=${{ needs.cicd-labreport-docker.outputs.image_tag }} \
              --set services.symptom-service.image.tag=${{ needs.cicd-symptom-docker.outputs.image_tag }} \
              --set services.ai-companion-service.image.tag=${{ needs.cicd-ai-companion-docker.outputs.image_tag }} \
              --set services.health-summary-service.image.tag=${{ needs.cicd-health-summary-docker.outputs.image_tag }} \
              --set services.family-service.image.tag=${{ needs.cicd-family-docker.outputs.image_tag }} \
              --wait \
              --timeout 10m; then
              success=true
              echo "Helm upgrade completed successfully!"
              break
            else
              echo "Helm upgrade attempt $i failed. Waiting $RETRY_DELAY seconds before retrying..."
              sleep $RETRY_DELAY
            fi
          done
          
          if [ "$success" = false ]; then
            echo "Helm upgrade failed after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Verify Deployment Health
        run: |
          kubectl get pods -n docbridge

      - name: Run Smoke Test against Gateway
        run: |
          AGW_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 15 \
            http://${{ needs.setup-infrastructure.outputs.agw_ip }}/api/v1/health)
          if [ "$AGW_RESPONSE" != "200" ]; then
            echo "Health check failed: HTTP $AGW_RESPONSE"
            exit 1
          fi
          echo "Health check passed: HTTP $AGW_RESPONSE"

      - name: Handle Rollback on Failure
        if: failure()
        run: |
          echo "====================== DEPLOYMENT FAILED — TRIGGERING HELM ROLLBACK ======================"
          helm rollback docbridge -n docbridge
          echo "Current pod status after rollback:"
          kubectl get pods -n docbridge

      - name: Send Success Notification Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: DocBridge DevOps <${{ secrets.SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_EMAIL }}
          subject: SUCCESS - Deploy DocBridge Application - Run #${{ github.run_number }}
          body: |
            The Helm deployment of DocBridge Application has succeeded.
            
            Status: SUCCESS
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            
            App Gateway IP: http://${{ needs.setup-infrastructure.outputs.agw_ip }}
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Changed Services: ${{ needs.detect-changes.outputs.changed_services }}

      - name: Send Failure/Rollback Notification Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: DocBridge DevOps <${{ secrets.SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_EMAIL }}
          subject: FAILED + ROLLED BACK - Deploy DocBridge Application - Run #${{ github.run_number }}
          body: |
            The Helm deployment of DocBridge Application has FAILED.
            An automatic rollback to the last known healthy state has been executed.
            
            Status: FAILED (Rolled back)
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            
            App Gateway IP: http://${{ needs.setup-infrastructure.outputs.agw_ip }}
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Changed Services: ${{ needs.detect-changes.outputs.changed_services }}

  pipeline-summary:
    name: Pipeline Summary
    needs:
      - detect-changes
      - cicd-db-migrations
      - cicd-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print Execution Summary
        run: |
          echo "=========================================================="
          echo "            DOCBRIDGE PIPELINE SUMMARY STATUS             "
          echo "=========================================================="
          echo "Trigger event: ${{ github.event_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Changed services list: ${{ needs.detect-changes.outputs.changed_services }}"
          echo "Database migrations updated: ${{ needs.detect-changes.outputs.has_database }}"
          echo "Application Access URL: http://57.167.90.5"
          echo "=========================================================="
