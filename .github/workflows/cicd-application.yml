name: DocBridge Application CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'gateway/**'
      - 'frontend/**'
      - 'database/**'
      - 'helm/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'gateway/**'
      - 'frontend/**'
      - 'database/**'
      - 'helm/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      service_override:
        description: "Force deploy specific service (leave empty for auto-detect)"
        required: false
        type: string
        default: ''
      deploy_all:
        description: "Force deploy all services"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      changed_services: ${{ steps.detect.outputs.changed_services }}
      has_database: ${{ steps.detect.outputs.has_database }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Changed Paths
        id: detect
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin main --depth=1
            CHANGED=$(git diff --name-only origin/main HEAD)
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD)
            else
              CHANGED=$(git show --name-only --format="" HEAD)
            fi
          fi
          set -e
          
          echo "Changed files:"
          echo "$CHANGED"
          
          services=()
          has_database=false
          has_helm=false
          
          for file in $CHANGED; do
            if [[ $file =~ ^services/([^/]+)/ ]]; then
              svc_folder="${BASH_REMATCH[1]}"
              if [ "$svc_folder" = "consultation-service" ]; then
                services+=("consultation")
              elif [ "$svc_folder" = "prescription-service" ]; then
                services+=("prescription")
              elif [ "$svc_folder" = "reminder-service" ]; then
                services+=("reminder")
              elif [ "$svc_folder" = "labreport-service" ]; then
                services+=("labreport")
              elif [ "$svc_folder" = "symptom-service" ]; then
                services+=("symptom")
              elif [ "$svc_folder" = "ai-companion-service" ]; then
                services+=("ai-companion")
              elif [ "$svc_folder" = "health-summary-service" ]; then
                services+=("health-summary")
              elif [ "$svc_folder" = "family-service" ]; then
                services+=("family")
              elif [ "$svc_folder" = "auth-service" ]; then
                services+=("auth-service")
              fi
            elif [[ $file =~ ^gateway/ ]]; then
              services+=("api-gateway")
            elif [[ $file =~ ^frontend/ ]]; then
              services+=("frontend")
            elif [[ $file =~ ^database/ ]]; then
              has_database=true
            elif [[ $file =~ ^helm/ ]]; then
              has_helm=true
            fi
          done
          
          # Force inputs override logic
          if [ "${{ github.event.inputs.deploy_all }}" = "true" ] || [ "$has_helm" = "true" ]; then
            services=("frontend" "api-gateway" "auth-service" "consultation" "prescription" "reminder" "labreport" "symptom" "ai-companion" "health-summary" "family")
            has_database=true
          elif [ -n "${{ github.event.inputs.service_override }}" ]; then
            services=("${{ github.event.inputs.service_override }}")
            if [ "${{ github.event.inputs.service_override }}" = "db-migrations" ]; then
              has_database=true
            fi
          fi
          
          # Deduplicate
          unique_services=($(echo "${services[@]}" | tr ' ' '\n' | sort -u | tr '\n' ' '))
          
          # Output JSON array
          services_json=$(printf '%s\n' "${unique_services[@]}" | jq -R . | jq -s -c .)
          echo "changed_services=$services_json" >> $GITHUB_OUTPUT
          echo "has_database=$has_database" >> $GITHUB_OUTPUT
          
          if [ ${#unique_services[@]} -gt 0 ] || [ "$has_database" = "true" ]; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "any_changed=false" >> $GITHUB_OUTPUT
          fi
          
          echo "Detected changed services: $services_json"
          echo "Has database changes: $has_database"

  setup-infrastructure:
    name: Get Infrastructure Values from Terraform
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    outputs:
      kv_name: ${{ steps.tf-outputs.outputs.kv_name }}
      identity_id: ${{ steps.tf-outputs.outputs.identity_id }}
      postgres_fqdn: ${{ steps.tf-outputs.outputs.postgres_fqdn }}
      agw_ip: ${{ steps.tf-outputs.outputs.agw_ip }}
      acr_login_server: ${{ steps.tf-outputs.outputs.acr_login_server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=docbridge-rg" \
            -backend-config="storage_account_name=${{ secrets.TF_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.TF_CONTAINER_NAME }}" \
            -backend-config="key=dev.terraform.tfstate"

      - name: Capture Terraform Outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "kv_name=$(terraform output -raw key_vault_name)" >> $GITHUB_OUTPUT
          echo "identity_id=$(terraform output -raw workload_identity_client_id)" >> $GITHUB_OUTPUT
          echo "postgres_fqdn=$(terraform output -raw postgres_fqdn)" >> $GITHUB_OUTPUT
          echo "agw_ip=$(terraform output -raw app_gateway_public_ip)" >> $GITHUB_OUTPUT
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT

  cicd-db-migrations:
    name: "DB Migrations - Docker Build + Push"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_database == 'true'
    uses: ./.github/workflows/template-docker-acr.yml
    with:
      service_name: db-migrations
      image_name: db-migrations
      working_directory: ./database
      node_version: '18'
    secrets: inherit

  # =========================================================================
  # 1. FRONTEND SERVICE PIPELINE STAGES
  # =========================================================================
  cicd-frontend-sonar:
    name: "Frontend - Stage 1 - SonarCloud"
    needs: detect-changes
    if: contains(fromJson(needs.detect-changes.outputs.changed_services), 'frontend')
    uses: ./.github/workflows/template-sonarcloud.yml
    with:
      service_name: frontend
      working_directory: ./frontend
      sonar_project_key: docbridge_frontend
    secrets: inherit

  cicd-frontend-build:
    name: "Frontend - Stage 2 - Build + Snyk"
    needs: [detect-changes, cicd-frontend-sonar]
    if: contains(fromJson(needs.detect-changes.outputs.changed_services), 'frontend')
    uses: ./.github/workflows/template-build-snyk.yml
    with:
      service_name: frontend
      working_directory: ./frontend
      node_version: '20'
    secrets: inherit

  cicd-frontend-docker:
    name: "Frontend - Stage 3 - Docker + ACR"
    needs: [detect-changes, cicd-frontend-build]
    if: >
      github.event_name != 'pull_request' &&
      contains(fromJson(needs.detect-changes.outputs.changed_services), 'frontend')
    uses: ./.github/workflows/template-docker-acr.yml
    with:
      service_name: frontend
