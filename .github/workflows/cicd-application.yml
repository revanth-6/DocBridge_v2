      - cicd-api-gateway-deploy
      - cicd-auth-service-deploy
      - cicd-consultation-deploy
      - cicd-prescription-deploy
      - cicd-reminder-deploy
      - cicd-labreport-deploy
      - cicd-symptom-deploy
      - cicd-ai-companion-deploy
      - cicd-health-summary-deploy
      - cicd-family-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print Execution Summary
        run: |
          echo "=========================================================="
          echo "            DOCBRIDGE PIPELINE SUMMARY STATUS             "
          echo "=========================================================="
          echo "Trigger event: ${{ github.event_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Changed services list: ${{ needs.detect-changes.outputs.changed_services }}"
          echo "Database migrations updated: ${{ needs.detect-changes.outputs.has_database }}"
          echo "Application Access URL: http://57.167.90.5"
          echo "=========================================================="
