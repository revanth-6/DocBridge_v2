name: Template SonarCloud

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      sonar_project_key:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_ORGANIZATION:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
      ALERT_EMAIL:
        required: false

jobs:
  sonarcloud-sast:
    name: SonarCloud SAST - ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectName=${{ inputs.service_name }}
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.js
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: ${{ inputs.working_directory }}/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: DocBridge DevOps <${{ secrets.SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_EMAIL }}
          subject: FAILED - SonarCloud SAST - ${{ inputs.service_name }} - DocBridge
          body: |
            The SonarCloud SAST / Quality Gate stage has FAILED for service: ${{ inputs.service_name }}.

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            
            SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=${{ inputs.sonar_project_key }}
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Action Required: Please check the SonarCloud analysis logs and fix any blocker, critical, or major issues violating the Quality Gate.
